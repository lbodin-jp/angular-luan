<section class="carousel">
  <div class="carousel__label">{{ label() }}</div>
  <div class="carousel__track">
    @for (jeu of jeux(); let dernierJeu = $last; track jeu.id) {
     <app-carte-jeu [jeu]="jeu" />
     @if (dernierJeu) {
      <button type="button" class="carousel__next">›</button>
    }
      
    }
   
    @empty {
      <p class="carousel__empty">Aucun jeu trouvé pour ce genre.</p>
    }
    
  </div>
</section>
