<section class="carousel">
  <div class="carousel__label">{{ label() }}</div>
  <div class="carousel__track">
    @for (jeu of jeux(); track jeu.id) {
      <div class="carousel__card">
        <!-- <img [src]="jeu.image" [alt]="jeu.name" /> -->
        <p>{{ jeu.titre }}</p>
        <p>{{ jeu.genre }}</p>
        <p>{{ jeu.plateforme }}</p>
        <p>{{ jeu.favoris }}</p>
        <p>{{ jeu.note }}/20</p>
        <p>{{ jeu.termine }}</p>
      </div>
    }
    <button type="button" class="carousel__next">›</button>
  </div>
</section>
